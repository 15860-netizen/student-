<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการศึกษา | Realm of Twin Moons</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-pink-light: #ffd4e5;
            --sky-pink-deep: #f7a3c4;
            --sky-purple: #3d1c5a;
            --magic-gold: #ffca00;
            --magic-cyan: #00f3ff;
            --dragon-dark: #2b0c0c;
            --dragon-mid: #5e1919;
            --dragon-light: #ff4747;
            --grass-ground: #0b3a1e;
            --grass-blade: #2ecc71;
            --moon-large: #fffdf0;
            --moon-small: #ffb3d1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Sarabun", sans-serif;
        }

        body {
            background: linear-gradient(to bottom, var(--sky-pink-light) 0%, var(--sky-pink-deep) 35%, var(--sky-purple) 70%, var(--grass-ground) 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* ==================================================
           [ MASTER 4D CINEMATIC UNIVERSE ENGINE ]
           ================================================== */
        .magic-universe {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 🌙 ดวงจันทร์คู่เวทมนตร์ */
        .twin-moons-container {
            position: absolute;
            top: 4%; right: 10%;
            width: 200px; height: 150px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .moon-large {
            width: 85px; height: 85px;
            background: radial-gradient(circle at 30% 30%, #ffffff, var(--moon-large));
            border-radius: 50%;
            box-shadow: 0 0 35px rgba(255, 253, 240, 0.8), 0 0 70px rgba(255, 253, 240, 0.4);
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }
        .moon-small {
            width: 40px; height: 40px;
            background: radial-gradient(circle at 30% 30%, #fff0f5, var(--moon-small));
            border-radius: 50%;
            margin-top: 35px;
            box-shadow: 0 0 25px rgba(255, 179, 209, 0.8), 0 0 50px rgba(255, 179, 209, 0.4);
        }

        /* ก้อนเมฆหมอก 3D */
        .cloud-3d-1 {
            position: absolute; bottom: 180px; left: -50px;
            width: 350px; height: 100px;
            background: rgba(255, 255, 255, 0.45);
            border-radius: 50px; filter: blur(25px);
            animation: cloudFloat 12s infinite alternate ease-in-out;
        }
        .cloud-3d-2 {
            position: absolute; top: 30%; right: -80px;
            width: 400px; height: 120px;
            background: rgba(247, 163, 196, 0.5);
            border-radius: 60px; filter: blur(30px);
            animation: cloudFloat 16s infinite alternate-reverse ease-in-out;
        }
        @keyframes cloudFloat { 0% { transform: translateX(0); } 100% { transform: translateX(40px); } }

        /* ⛰️ ระบบเทือกเขาสามมิติด้านหลัง */
        .mountain-range {
            position: absolute;
            bottom: 110px; right: -5%;
            width: 60%; height: 250px;
            background: linear-gradient(180deg, #231138 0%, #0d0517 100%);
            clip-path: polygon(0% 100%, 20% 40%, 40% 70%, 65% 25%, 85% 65%, 100% 30%, 100% 100%);
            opacity: 0.6;
            z-index: 2;
        }

        /* 🌲 แนวต้นไม้/ต้นสนแฟนตาซี */
        .forest-layer {
            position: absolute; bottom: 110px; left: 0; width: 100%; height: 60px;
            z-index: 4; display: flex; gap: 20px; padding-left: 25%; opacity: 0.8;
        }
        .magic-tree {
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 50px solid #143d22;
            position: relative;
        }
        .magic-tree::before {
            content: ''; position: absolute; top: 15px; left: -15px;
            border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-bottom: 40px solid #1a4d2b;
        }
        .magic-tree::after {
            content: ''; position: absolute; top: 30px; left: -10px;
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-bottom: 30px solid #2ecc71;
            opacity: 0.4;
        }

        /* --- มหาปราสาทเวทมนตร์ 4 มิติ --- */
        .castle-4d-realm {
            position: absolute; bottom: 110px; left: 5%;
            width: 400px; height: 400px;
            transform: perspective(1200px) rotateY(22deg) rotateX(3deg);
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.65));
            z-index: 3;
        }
        .castle-base-wall {
            position: absolute; bottom: 0; left: 50px;
            width: 260px; height: 120px;
            background: linear-gradient(90deg, #281a3d 0%, #170e24 100%);
            border-top: 4px solid #483068;
            box-shadow: inset -15px 0 20px rgba(0,0,0,0.5);
        }
        .castle-gate {
            position: absolute; bottom: 0; left: 105px;
            width: 50px; height: 65px;
            background: #0d0414; border-radius: 25px 25px 0 0;
            border: 3px solid var(--magic-gold);
            box-shadow: 0 0 20px var(--magic-gold);
        }
        .tower-cylindrical {
            position: absolute; bottom: 118px; left: 130px;
            width: 100px; height: 180px;
            background: linear-gradient(90deg, #362054 0%, #1f0f30 60%, #12081e 100%);
            border-radius: 10px 10px 0 0;
        }
        .roof-cone-4d {
            position: absolute; bottom: 298px; left: 115px;
            width: 130px; height: 95px;
            background: linear-gradient(135deg, #9642a4 0%, #4a1456 70%, #22052a 100%);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        .window-glow-4d {
            position: absolute; width: 14px; height: 26px;
            background: linear-gradient(to bottom, #fff, var(--magic-gold));
            border-radius: 7px 7px 0 0;
            box-shadow: 0 0 20px #ff7700, 0 5px 15px rgba(255,202,0,0.8);
        }

        /* ปืนใหญ่เวทมนตร์ติดกับตัวหอปราสาท */
        .castle-cannon {
            position: absolute;
            bottom: 145px; left: 35px;
            width: 32px; height: 16px;
            background: linear-gradient(to bottom, #3a3a3a, #111111);
            border: 1px solid #555;
            border-radius: 3px;
            transform: rotate(-15deg);
            z-index: 10;
            box-shadow: -2px 2px 5px rgba(0,0,0,0.6);
        }
        .castle-cannon::after {
            content: ''; position: absolute; right: -4px; top: 2px;
            width: 6px; height: 10px; background: #ffaa00;
            border-radius: 50%; opacity: 0;
            animation: cannonFlash 20s infinite linear;
            animation-delay: 4.8s;
        }
        @keyframes cannonFlash {
            0%, 4% { opacity: 1; filter: blur(1px); }
            5%, 100% { opacity: 0; }
        }

        /* --- 🔮 ระบบกระสุนเวทมนตร์ --- */
        .magic-bullet {
            position: absolute;
            bottom: 230px; left: 200px; 
            width: 12px; height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff, var(--magic-cyan));
            box-shadow: 0 0 15px var(--magic-cyan), 0 0 30px var(--magic-cyan);
            opacity: 0;
            z-index: 55;
        }
        .bullet-1 { animation: bulletChase1 20s infinite linear; animation-delay: 4.8s; }
        .bullet-2 { animation: bulletChase2 20s infinite linear; animation-delay: 5.1s; }
        .bullet-3 { animation: bulletChase3 20s infinite linear; animation-delay: 5.4s; }

        @keyframes bulletChase1 {
            0% { opacity: 1; left: 200px; bottom: 230px; transform: scale(1); }
            30% { opacity: 1; left: 60vw; bottom: 70%; transform: scale(0.8); }
            60% { opacity: 0; left: 120vw; bottom: 85%; transform: scale(0.5); }
            100% { opacity: 0; }
        }
        @keyframes bulletChase2 {
            0% { opacity: 1; left: 200px; bottom: 230px; transform: scale(1); }
            30% { opacity: 1; left: 58vw; bottom: 68%; transform: scale(0.8); }
            60% { opacity: 0; left: 120vw; bottom: 83%; transform: scale(0.5); }
            100% { opacity: 0; }
        }
        @keyframes bulletChase3 {
            0% { opacity: 1; left: 200px; bottom: 230px; transform: scale(1); }
            30% { opacity: 1; left: 56vw; bottom: 66%; transform: scale(0.8); }
            60% { opacity: 0; left: 120vw; bottom: 81%; transform: scale(0.5); }
            100% { opacity: 0; }
        }

        /* --- 🐉 🔥 ปรับแต่งใหม่: มังกรยักษ์มหึมา (Giant Epic Dragon) --- */
        .dragon-epic-universe {
            position: absolute; 
            top: 5%;
            animation: dragonMasterFlight 22s infinite linear;
            animation-delay: 2s;
            z-index: 5; /* อยู่เลเยอร์ลึกกว่ากล่องข้อความ เพื่อให้บินรอดใต้กล่องได้สนิท */
        }
        .dragon-master-model {
            position: relative; 
            width: 380px; height: 180px; /* ขยาย Base Area ของตัวมังกรให้กว้างใหญ่ขึ้น */
            transform: perspective(1000px) rotateY(-25deg) rotateZ(3deg) scale(1.5); /* ใช้ scale(1.5) เพื่อทวีคูณความใหญ่ยักษ์ระดับบอส */
            transform-style: preserve-3d;
        }
        .dm-body {
            position: absolute; left: 90px; top: 50px;
            width: 160px; height: 60px; /* เพิ่มความหนาของลำตัวมังกร */
            background: linear-gradient(135deg, var(--dragon-dark) 0%, var(--dragon-mid) 60%, #1a0202 100%);
            border-radius: 45% 55% 45% 40%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            animation: dmBodyMove 1s infinite alternate ease-in-out;
        }
        .dm-head {
            position: absolute; left: 230px; top: 20px;
            width: 85px; height: 50px; /* ขยายหัวมังกร */
            background: var(--dragon-dark);
            border-radius: 12px 30px 20px 12px;
            z-index: 7;
        }
        .dm-head::before {
            content: ''; position: absolute; top: -18px; left: 15px;
            width: 8px; height: 28px; background: #eaeaea; /* เขาใหญ่ขึ้น */
            border-radius: 50% 50% 0 0; transform: rotate(-20deg);
            box-shadow: 0 0 8px rgba(255,255,255,0.6);
        }
        .dm-eye {
            position: absolute; top: 15px; left: 45px;
            width: 12px; height: 6px; background: var(--magic-cyan);
            box-shadow: 0 0 15px var(--magic-cyan);
            clip-path: polygon(0 20%, 100% 0, 70% 100%);
        }
        .dm-jaw {
            position: absolute; bottom: -10px; left: 35px;
            width: 45px; height: 18px; background: #1f0404;
            border-radius: 0 0 8px 8px;
            transform-origin: top left;
            animation: dmJawOpen 2.5s infinite ease-in-out;
        }
        .dm-fire-blast {
            position: absolute; left: 300px; top: 25px;
            width: 180px; height: 70px; /* เอฟเฟกต์พ่นไฟที่ใหญ่และยาวสะใจขึ้น */
            background: radial-gradient(circle, #fff 10%, #ff8c00 50%, transparent 70%);
            filter: blur(2px); opacity: 0; transform: scale(0.3);
            animation: dmFire 2.5s infinite ease-in-out;
            box-shadow: 0 0 35px #ff2a00;
            z-index: 8;
        }
        .dm-wing-front {
            position: absolute; top: -80px; left: 110px;
            width: 160px; height: 160px; /* สยายปีกยักษ์ */
            background: linear-gradient(210deg, var(--dragon-light), #210303);
            clip-path: polygon(0 85%, 35% 0, 100% 25%, 55% 100%);
            transform-origin: bottom left;
            animation: dmWing 0.45s infinite alternate ease-in-out;
            z-index: 9;
        }
        .dm-tail-long {
            position: absolute; left: -90px; top: 60px;
            width: 200px; height: 15px; /* หางยาวขึ้นทรงพลัง */
            background: linear-gradient(to right, transparent, var(--dragon-dark));
            border-radius: 50%;
            transform-origin: right center;
            animation: dmTailWhip 0.7s infinite alternate ease-in-out;
        }
        .dm-tail-fin {
            position: absolute; left: 0; top: -15px;
            width: 30px; height: 45px;
            background: var(--dragon-mid);
            clip-path: polygon(100% 50%, 0 0, 30% 50%, 0 100%);
        }

        @keyframes dmWing { 0% { transform: rotateX(-35deg) rotateY(-5deg); } 100% { transform: rotateX(45deg) rotateY(15deg); } }
        @keyframes dmBodyMove { 0% { transform: translateY(-4px) rotateZ(-1deg); } 100% { transform: translateY(4px) rotateZ(1deg); } }
        @keyframes dmTailWhip { 0% { transform: rotate(-12deg); } 100% { transform: rotate(12deg); } }
        @keyframes dmJawOpen { 0%, 100% {
