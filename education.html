<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการศึกษา | Realm of Twin Moons</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-pink-light: #ffd4e5;
            --sky-pink-deep: #f7a3c4;
            --sky-purple: #3d1c5a;
            --magic-gold: #ffca00;
            --magic-cyan: #00f3ff;
            --dragon-dark: #2b0c0c;
            --dragon-mid: #5e1919;
            --dragon-light: #ff4747;
            --grass-ground: #0b3a1e;
            --grass-blade: #2ecc71;
            --moon-large: #fffdf0;
            --moon-small: #ffb3d1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Sarabun", sans-serif;
        }

        body {
            background: linear-gradient(to bottom, var(--sky-pink-light) 0%, var(--sky-pink-deep) 35%, var(--sky-purple) 70%, var(--grass-ground) 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* ==================================================
           [ MASTER 4D CINEMATIC UNIVERSE ENGINE ]
           ================================================== */
        .magic-universe {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 🌙 ดวงจันทร์คู่เวทมนตร์ */
        .twin-moons-container {
            position: absolute;
            top: 4%; right: 10%;
            width: 200px; height: 150px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .moon-large {
            width: 85px; height: 85px;
            background: radial-gradient(circle at 30% 30%, #ffffff, var(--moon-large));
            border-radius: 50%;
            box-shadow: 0 0 35px rgba(255, 253, 240, 0.8), 0 0 70px rgba(255, 253, 240, 0.4);
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }
        .moon-small {
            width: 40px; height: 40px;
            background: radial-gradient(circle at 30% 30%, #fff0f5, var(--moon-small));
            border-radius: 50%;
            margin-top: 35px;
            box-shadow: 0 0 25px rgba(255, 179, 209, 0.8), 0 0 50px rgba(255, 179, 209, 0.4);
        }

        /* ก้อนเมฆหมอก 3D */
        .cloud-3d-1 {
            position: absolute; bottom: 180px; left: -50px;
            width: 350px; height: 100px;
            background: rgba(255, 255, 255, 0.45);
            border-radius: 50px; filter: blur(25px);
            animation: cloudFloat 12s infinite alternate ease-in-out;
        }
        .cloud-3d-2 {
            position: absolute; top: 30%; right: -80px;
            width: 400px; height: 120px;
            background: rgba(247, 163, 196, 0.5);
            border-radius: 60px; filter: blur(30px);
            animation: cloudFloat 16s infinite alternate-reverse ease-in-out;
        }
        @keyframes cloudFloat { 0% { transform: translateX(0); } 100% { transform: translateX(40px); } }

        /* ⛰️ ระบบเทือกเขาสามมิติด้านหลัง */
        .mountain-range {
            position: absolute;
            bottom: 110px; right: -5%;
            width: 60%; height: 250px;
            background: linear-gradient(180deg, #231138 0%, #0d0517 100%);
            clip-path: polygon(0% 100%, 20% 40%, 40% 70%, 65% 25%, 85% 65%, 100% 30%, 100% 100%);
            opacity: 0.6;
            z-index: 2;
        }

        /* 🌲 แนวต้นไม้/ต้นสนแฟนตาซี */
        .forest-layer {
            position: absolute; bottom: 110px; left: 0; width: 100%; height: 60px;
            z-index: 4; display: flex; gap: 20px; padding-left: 25%; opacity: 0.8;
        }
        .magic-tree {
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 50px solid #143d22;
            position: relative;
        }
        .magic-tree::before {
            content: ''; position: absolute; top: 15px; left: -15px;
            border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-bottom: 40px solid #1a4d2b;
        }
        .magic-tree::after {
            content: ''; position: absolute; top: 30px; left: -10px;
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-bottom: 30px solid #2ecc71;
            opacity: 0.4;
        }

        /* --- มหาปราสาทเวทมนตร์ 4 มิติ --- */
        .castle-4d-realm {
            position: absolute; bottom: 110px; left: 5%;
            width: 400px; height: 400px;
            transform: perspective(1200px) rotateY(22deg) rotateX(3deg);
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.65));
            z-index: 3;
        }
        .castle-base-wall {
            position: absolute; bottom: 0; left: 50px;
            width: 260px; height: 120px;
            background: linear-gradient(90deg, #281a3d 0%, #170e24 100%);
            border-top: 4px solid #483068;
            box-shadow: inset -15px 0 20px rgba(0,0,0,0.5);
        }
        .castle-gate {
            position: absolute; bottom: 0; left: 105px;
            width: 50px; height: 65px;
            background: #0d0414; border-radius: 25px 25px 0 0;
            border: 3px solid var(--magic-gold);
            box-shadow: 0 0 20px var(--magic-gold);
        }
        .tower-cylindrical {
            position: absolute; bottom: 118px; left: 130px;
            width: 100px; height: 180px;
            background: linear-gradient(90deg, #362054 0%, #1f0f30 60%, #12081e 100%);
            border-radius: 10px 10px 0 0;
        }
        .roof-cone-4d {
            position: absolute; bottom: 298px; left: 115px;
            width: 130px; height: 95px;
            background: linear-gradient(135deg, #9642a4 0%, #4a1456 70%, #22052a 100%);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        .window-glow-4d {
            position: absolute; width: 14px; height: 26px;
            background: linear-gradient(to bottom, #fff, var(--magic-gold));
            border-radius: 7px 7px 0 0;
            box-shadow: 0 0 20px #ff7700, 0 5px 15px rgba(255,202,0,0.8);
        }

        /* ปืนใหญ่เวทมนตร์ติดกับตัวหอปราสาทแนบชิดขึ้น */
        .castle-cannon {
            position: absolute;
            bottom: 145px; left: 35px;
            width: 32px; height: 16px;
            background: linear-gradient(to bottom, #3a3a3a, #111111);
            border: 1px solid #555;
            border-radius: 3px;
            transform: rotate(-15deg);
            z-index: 10;
            box-shadow: -2px 2px 5px rgba(0,0,0,0.6);
        }
        .castle-cannon::after {
            content: ''; position: absolute; right: -4px; top: 2px;
            width: 6px; height: 10px; background: #ffaa00;
            border-radius: 50%; opacity: 0;
            animation: cannonFlash 20s infinite linear;
            animation-delay: 4.8s;
        }
        @keyframes cannonFlash {
            0%, 4% { opacity: 1; filter: blur(1px); }
            5%, 100% { opacity: 0; }
        }

        /* --- 🔮 ระบบกระสุนเวทมนตร์ --- */
        .magic-bullet {
            position: absolute;
            bottom: 230px; left: 200px; 
            width: 12px; height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff, var(--magic-cyan));
            box-shadow: 0 0 15px var(--magic-cyan), 0 0 30px var(--magic-cyan);
            opacity: 0;
            z-index: 55;
        }
        .bullet-1 { animation: bulletChase1 20s infinite linear; animation-delay: 4.8s; }
        .bullet-2 { animation: bulletChase2 20s infinite linear; animation-delay: 5.1s; }
        .bullet-3 { animation: bulletChase3 20s infinite linear; animation-delay: 5.4s; }

        @keyframes bulletChase1 {
            0% { opacity: 1; left: 200px; bottom: 230px; transform: scale(1); }
            30% { opacity: 1; left: 60vw; bottom: 70%; transform: scale(0.8); }
            60% { opacity: 0; left: 120vw; bottom: 85%; transform: scale(0.5); }
            100% { opacity: 0; }
        }
        @keyframes bulletChase2 {
            0% { opacity: 1; left: 200px; bottom: 230px; transform: scale(1); }
            30% { opacity: 1; left: 58vw; bottom: 68%; transform: scale(0.8); }
            60% { opacity: 0; left: 120vw; bottom: 83%; transform: scale(0.5); }
            100% { opacity: 0; }
        }
        @keyframes bulletChase3 {
            0% { opacity: 1; left: 200px; bottom: 230px; transform: scale(1); }
            30% { opacity: 1; left: 56vw; bottom: 66%; transform: scale(0.8); }
            60% { opacity: 0; left: 120vw; bottom: 81%; transform: scale(0.5); }
            100% { opacity: 0; }
        }

        /* --- 🐉 มังกรปรับขนาดใหม่ตามคำขอ: scale(0.73) และบินลอดใต้กรอบข้อความ --- */
        .dragon-epic-universe {
            position: absolute; top: 12%;
            animation: dragonMasterFlight 20s infinite linear;
            animation-delay: 3s;
            z-index: 5; /* บินลอดใต้กรอบเนื้อหาหลัก (z-index: 80) */
        }
        .dragon-master-model {
            position: relative; 
            width: 200px; height: 90px;
            transform: perspective(1000px) rotateY(-25deg) rotateZ(3deg) scale(0.73); /* อัปเดตขนาดเป็น 73 (ระหว่าง 72-74) */
            transform-style: preserve-3d;
        }
        .dm-body {
            position: absolute; left: 55px; top: 25px;
            width: 80px; height: 32px;
            background: linear-gradient(135deg, var(--dragon-dark) 0%, var(--dragon-mid) 60%, #1a0202 100%);
            border-radius: 45% 55% 45% 40%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            animation: dmBodyMove 1s infinite alternate ease-in-out;
        }
        .dm-head {
            position: absolute; left: 125px; top: 10px;
            width: 45px; height: 28px;
            background: var(--dragon-dark);
            border-radius: 12px 30px 20px 12px;
            z-index: 7;
        }
        .dm-head::before {
            content: ''; position: absolute; top: -10px; left: 8px;
            width: 4px; height: 16px; background: #eaeaea;
            border-radius: 50% 50% 0 0; transform: rotate(-20deg);
            box-shadow: 0 0 5px rgba(255,255,255,0.6);
        }
        .dm-eye {
            position: absolute; top: 8px; left: 25px;
            width: 6px; height: 3px; background: var(--magic-cyan);
            box-shadow: 0 0 10px var(--magic-cyan);
            clip-path: polygon(0 20%, 100% 0, 70% 100%);
        }
        .dm-jaw {
            position: absolute; bottom: -5px; left: 20px;
            width: 25px; height: 10px; background: #1f0404;
            border-radius: 0 0 8px 8px;
            transform-origin: top left;
            animation: dmJawOpen 2.5s infinite ease-in-out;
        }
        .dm-fire-blast {
            position: absolute; left: 165px; top: 18px;
            width: 90px; height: 35px;
            background: radial-gradient(circle, #fff 10%, #ff8c00 50%, transparent 70%);
            filter: blur(1px); opacity: 0; transform: scale(0.3);
            animation: dmFire 2.5s infinite ease-in-out;
            box-shadow: 0 0 20px #ff2a00;
            z-index: 8;
        }
        .dm-wing-front {
            position: absolute; top: -35px; left: 70px;
            width: 75px; height: 75px;
            background: linear-gradient(210deg, var(--dragon-light), #210303);
            clip-path: polygon(0 85%, 35% 0, 100% 25%, 55% 100%);
            transform-origin: bottom left;
            animation: dmWing 0.45s infinite alternate ease-in-out;
            z-index: 9;
        }
        .dm-tail-long {
            position: absolute; left: -45px; top: 30px;
            width: 105px; height: 8px;
            background: linear-gradient(to right, transparent, var(--dragon-dark));
            border-radius: 50%;
            transform-origin: right center;
            animation: dmTailWhip 0.7s infinite alternate ease-in-out;
        }
        .dm-tail-fin {
            position: absolute; left: 0; top: -7px;
            width: 15px; height: 22px;
            background: var(--dragon-mid);
            clip-path: polygon(100% 50%, 0 0, 30% 50%, 0 100%);
        }

        @keyframes dmWing { 0% { transform: rotateX(-35deg) rotateY(-5deg); } 100% { transform: rotateX(45deg) rotateY(15deg); } }
        @keyframes dmBodyMove { 0% { transform: translateY(-2px) rotateZ(-1deg); } 100% { transform: translateY(2px) rotateZ(1deg); } }
        @keyframes dmTailWhip { 0% { transform: rotate(-10deg); } 100% { transform: rotate(10deg); } }
        @keyframes dmJawOpen { 0%, 100% { transform: rotate(0deg); } 35%, 65% { transform: rotate(22deg); } }
        @keyframes dmFire { 0%, 100% { opacity: 0; transform: scale(0.3); } 40%, 60% { opacity: 1; transform: scale(1.4) translateX(15px) rotate(15deg); } }
        
        @keyframes dragonMasterFlight {
            0% { left: -300px; top: 35%; transform: scale(0.4); }
            30% { left: 25vw; top: 30%; transform: scale(0.6); }
            60% { left: 75vw; top: 18%; transform: scale(0.5); }
            100% { left: 130vw; top: 12%; transform: scale(0.3); }
        }

        /* --- 🛡️ กองทัพอัศวิน --- */
        .knights-runway {
            position: absolute; bottom: 105px; left: 0; width: 100%; height: 90px;
            z-index: 15;
        }
        .magic-knight {
            position: absolute; width: 45px; height: 75px;
            filter: drop-shadow(0 5px 8px rgba(0,0,0,0.5));
            animation: knightPanicRun 20s infinite linear;
        }
        .knight-armor {
            position: absolute; bottom: 0; left: 10px;
            width: 26px; height: 48px;
            background: linear-gradient(90deg, #7f8c8d, #bdc3c7, #34495e);
            border-radius: 6px 6px 0 0;
            animation: knightLegs 0.15s infinite alternate linear;
        }
        .knight-helmet {
            position: absolute; top: 16px; left: 13px;
            width: 20px; height: 20px;
            background: #7f8c8d; border-radius: 50%;
            border-bottom: 3px solid #2c3e50;
        }
        .knight-cape {
            position: absolute; top: 30px; left: -4px;
            width: 16px; height: 35px; background: #c0392b;
            border-radius: 4px; transform-origin: top right;
            animation: capeFlutter 0.1s infinite alternate ease-in-out;
        }

        .k1 { animation-delay: 0.5s; }
        .k2 { animation-delay: 1.2s; }
        .k2 .knight-cape { background: #2980b9; }
        .k3 { animation-delay: 1.8s; }
        .k3 .knight-cape { background: #8e44ad; }
        .k4 { animation-delay: 2.5s; }
        .k4 .knight-cape { background: #d35400; }

        @keyframes knightPanicRun {
            0% { left: -150px; transform: scale(0.75) skewX(10deg); }
            100% { left: 120vw; transform: scale(0.75) skewX(10deg); }
        }
        @keyframes knightLegs {
            0% { transform: translateY(0) rotate(2deg); }
            100% { transform: translateY(-3px) rotate(-2deg); }
        }
        @keyframes capeFlutter {
            0% { transform: rotate(35deg); }
            100% { transform: rotate(55deg); }
        }

        /* --- พื้นดิน --- */
        .ground-flat-luxury {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 110px;
            background: linear-gradient(to bottom, #0b3a1e 0%, #051d0f 100%);
            border-top: 3px solid rgba(46, 204, 113, 0.35);
            z-index: 10;
        }
        .grass-blades-container {
            position: absolute; top: -22px; left: 0; width: 100%; height: 30px;
            display: flex; justify-content: space-around; align-items: flex-end;
        }
        .blade {
            width: 4px; height: 22px;
            background: linear-gradient(to top, var(--grass-ground), var(--grass-blade));
            border-radius: 50% 50% 0 0;
            transform-origin: bottom center;
            animation: bladeSway 2.8s infinite ease-in-out alternate;
        }
        .blade:nth-child(2n) { height: 16px; animation-delay: -0.5s; }
        .blade:nth-child(3n) { height: 26px; animation-delay: -1.2s; }
        @keyframes bladeSway { 0% { transform: rotate(-4deg); } 100% { transform: rotate(8deg); } }

        /* ==================================================
           [ UI CONTROLS & MODERN CARDS ]
           ================================================== */
        nav {
            position: relative; z-index: 100;
            background: rgba(30, 13, 46, 0.5);
            padding: 18px; text-align: center;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(247, 163, 196, 0.3);
        }
        nav a {
            color: white; text-decoration: none; margin: 0 15px;
            font-size: 17px; font-weight: bold; transition: 0.3s;
        }
        nav a:hover { color: #fff; text-shadow: 0 0 15px var(--sky-pink-light), 0 0 25px var(--magic-cyan); }

        /* 👑 รักษาความแข็งแกร่งของเลเยอร์ (z-index: 80) เพื่อบังมังกรตอนบินผ่านได้สมบูรณ์แบบ */
        .container {
            position: relative; 
            z-index: 80; 
            width: 90%; max-width: 850px;
            margin: 40px auto 180px auto;
        }
        h1 {
            text-align: center; font-size: 42px; margin-bottom: 35px;
            color: white; text-shadow: 0 0 20px var(--sky-pink-light), 0 0 40px var(--sky-purple);
        }
        .school-link { display: block; text-decoration: none; color: white; margin-bottom: 25px; }
        
        .school {
            display: flex; align-items: center; gap: 25px;
            background: rgba(49, 23, 76, 0.85); 
            padding: 25px; border-radius: 24px;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(247, 163, 196, 0.25);
            box-shadow: 0 20px 50px rgba(0,0,0,0.45);
            transition: .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .school-link:hover .school {
            transform: translateY(-8px); border-color: var(--magic-cyan);
            background: rgba(76, 37, 115, 0.90);
            box-shadow: 0 20px 50px rgba(0, 243, 255, 0.25);
        }
        .school img {
            width: 100px; height: 100px; border-radius: 50%;
            background: #fff; padding: 6px; object-fit: contain;
            border: 3px solid var(--sky-pink-light);
        }
        .school h2 { color: var(--sky-pink-light); font-size: 22px; margin-bottom: 8px; }
        .school-link:hover h2 { color: var(--magic-cyan); }
        .school p { font-size: 17px; color: #fdf0f5; line-height: 1.7; }

        .btn {
            display: inline-block; margin-top: 20px; padding: 14px 45px;
            background: linear-gradient(45deg, var(--sky-pink-deep), var(--sky-purple));
            color: white; text-decoration: none; border-radius: 40px;
            font-weight: bold; font-size: 16px; transition: .3s;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn:hover {
            transform: scale(1.06); box-shadow: 0 8px 25px var(--magic-cyan);
            background: linear-gradient(45deg, var(--magic-cyan), #fff); color: var(--sky-purple);
        }
        footer {
            text-align: center; padding: 25px; margin-top: auto;
            background: #051d0f; border-top: 1px solid rgba(46, 204, 113, 0.2);
            color: #c5b5d3; font-weight: bold; position: relative; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="magic-universe">
        <div class="twin-moons-container">
            <div class="moon-large"></div>
            <div class="moon-small"></div>
        </div>

        <div class="cloud-3d-1"></div>
        <div class="cloud-3d-2"></div>

        <div class="mountain-range"></div>
        
        <div class="forest-layer">
            <div class="magic-tree"></div>
            <div class="magic-tree" style="transform: scale(0.8); margin-left: -10px;"></div>
            <div class="magic-tree" style="transform: scale(1.2); margin-left: 5px;"></div>
            <div class="magic-tree" style="transform: scale(0.9); margin-left: 20px;"></div>
            <div class="magic-tree" style="transform: scale(1.1); margin-left: -5px;"></div>
        </div>

        <div class="magic-bullet bullet-1"></div>
        <div class="magic-bullet bullet-2"></div>
        <div class="magic-bullet bullet-3"></div>

        <div class="dragon-epic-universe">
            <div class="dragon-master-model">
                <div class="dm-tail-long">
                    <div class="dm-tail-fin"></div>
                </div>
                <div class="dm-body"></div>
                <div class="dm-head">
                    <div class="dm-eye"></div>
                    <div class="dm-jaw"></div>
                </div>
                <div class="dm-wing-front"></div>
                <div class="dm-fire-blast"></div>
            </div>
        </div>

        <div class="castle-4d-realm">
            <div class="castle-base-wall">
                <div class="castle-gate"></div>
                <div class="window-glow-4d" style="top:30px; left:30px;"></div>
                <div class="window-glow-4d" style="top:30px; left:210px;"></div>
            </div>
            <div class="tower-cylindrical">
                <div class="window-glow-4d" style="top:40px; left:20px;"></div>
                <div class="window-glow-4d" style="top:40px; left:65px;"></div>
                <div class="window-glow-4d" style="top:100px; left:43px; background:var(--magic-cyan); box-shadow:0 0 15px var(--magic-cyan);"></div>
                <div class="castle-cannon"></div>
            </div>
            <div class="roof-cone-4d"></div>
        </div>

        <div class="knights-runway">
            <div class="magic-knight k1">
                <div class="knight-cape"></div>
                <div class="knight-armor"></div>
                <div class="knight-helmet"></div>
            </div>
            <div class="magic-knight k2">
                <div class="knight-cape"></div>
                <div class="knight-armor"></div>
                <div class="knight-helmet"></div>
            </div>
            <div class="magic-knight k3">
                <div class="knight-cape"></div>
                <div class="knight-armor"></div>
                <div class="knight-helmet"></div>
            </div>
            <div class="magic-knight k4">
                <div class="knight-cape"></div>
                <div class="knight-armor"></div>
                <div class="knight-helmet"></div>
            </div>
        </div>

        <div class="ground-flat-luxury">
