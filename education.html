<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการศึกษา | Realm of Twin Moons</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-pink-light: #ffd4e5;
            --sky-pink-deep: #f7a3c4;
            --sky-purple: #3d1c5a;
            --magic-gold: #ffca00;
            --magic-cyan: #00f3ff;
            --dragon-dark: #2b0c0c;
            --dragon-mid: #5e1919;
            --dragon-light: #ff4747;
            --grass-ground: #0b3a1e;
            --grass-blade: #2ecc71;
            --moon-large: #fffdf0;
            --moon-small: #ffb3d1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Sarabun", sans-serif;
        }

        body {
            background: linear-gradient(to bottom, var(--sky-pink-light) 0%, var(--sky-pink-deep) 35%, var(--sky-purple) 70%, var(--grass-ground) 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* ==================================================
           [ MASTER 4D CINEMATIC UNIVERSE ENGINE ]
           ================================================== */
        .magic-universe {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 🌙 ดวงจันทร์คู่เวทมนตร์ */
        .twin-moons-container {
            position: absolute;
            top: 4%; right: 10%;
            width: 200px; height: 150px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .moon-large {
            width: 85px; height: 85px;
            background: radial-gradient(circle at 30% 30%, #ffffff, var(--moon-large));
            border-radius: 50%;
            box-shadow: 0 0 35px rgba(255, 253, 240, 0.8), 0 0 70px rgba(255, 253, 240, 0.4);
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }
        .moon-small {
            width: 40px; height: 40px;
            background: radial-gradient(circle at 30% 30%, #fff0f5, var(--moon-small));
            border-radius: 50%;
            margin-top: 35px;
            box-shadow: 0 0 25px rgba(255, 179, 209, 0.8), 0 0 50px rgba(255, 179, 209, 0.4);
        }

        /* ก้อนเมฆหมอก 3D */
        .cloud-3d-1 {
            position: absolute; bottom: 180px; left: -50px;
            width: 350px; height: 100px;
            background: rgba(255, 255, 255, 0.45);
            border-radius: 50px; filter: blur(25px);
            animation: cloudFloat 12s infinite alternate ease-in-out;
        }
        .cloud-3d-2 {
            position: absolute; top: 30%; right: -80px;
            width: 400px; height: 120px;
            background: rgba(247, 163, 196, 0.5);
            border-radius: 60px; filter: blur(30px);
            animation: cloudFloat 16s infinite alternate-reverse ease-in-out;
        }
        @keyframes cloudFloat { 0% { transform: translateX(0); } 100% { transform: translateX(40px); } }

        /* ⛰️ ระบบเทือกเขาสามมิติด้านหลัง */
        .mountain-range {
            position: absolute;
            bottom: 110px; right: -5%;
            width: 60%; height: 250px;
            background: linear-gradient(180deg, #231138 0%, #0d0517 100%);
            clip-path: polygon(0% 100%, 20% 40%, 40% 70%, 65% 25%, 85% 65%, 100% 30%, 100% 100%);
            opacity: 0.6;
            z-index: 2;
        }

        /* --- มหาปราสาทเวทมนตร์ 4 มิติ --- */
        .castle-4d-realm {
            position: absolute; bottom: 110px; left: 5%;
            width: 400px; height: 400px;
            transform: perspective(1200px) rotateY(22deg) rotateX(3deg);
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.65));
            z-index: 3;
        }
        .castle-base-wall {
            position: absolute; bottom: 0; left: 50px;
            width: 260px; height: 120px;
            background: linear-gradient(90deg, #281a3d 0%, #170e24 100%);
            border-top: 4px solid #483068;
            box-shadow: inset -15px 0 20px rgba(0,0,0,0.5);
        }
        .castle-gate {
            position: absolute; bottom: 0; left: 105px;
            width: 50px; height: 65px;
            background: #0d0414; border-radius: 25px 25px 0 0;
            border: 3px solid var(--magic-gold);
            box-shadow: 0 0 20px var(--magic-gold);
        }
        .tower-cylindrical {
            position: absolute; bottom: 118px; left: 130px;
            width: 100px; height: 180px;
            background: linear-gradient(90deg, #362054 0%, #1f0f30 60%, #12081e 100%);
            border-radius: 10px 10px 0 0;
        }
        .roof-cone-4d {
            position: absolute; bottom: 298px; left: 115px;
            width: 130px; height: 95px;
            background: linear-gradient(135deg, #9642a4 0%, #4a1456 70%, #22052a 100%);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        .window-glow-4d {
            position: absolute; width: 14px; height: 26px;
            background: linear-gradient(to bottom, #fff, var(--magic-gold));
            border-radius: 7px 7px 0 0;
            box-shadow: 0 0 20px #ff7700, 0 5px 15px rgba(255,202,0,0.8);
        }

        /* 🌲 แนวต้นไม้/ต้นสนแฟนตาซี */
        .forest-layer {
            position: absolute; bottom: 110px; left: 0; width: 100%; height: 60px;
            z-index: 4; display: flex; gap: 40px; padding-left: 40%; opacity: 0.7;
        }
        .magic-tree {
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 50px solid #143d22;
            position: relative;
        }
        .magic-tree::before {
            content: ''; position: absolute; top: 20px; left: -15px;
            border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-bottom: 40px solid #1a4d2b;
        }

        /* --- 🐉 โมเดลพญามังกรระดับมหากาพย์ --- */
        .dragon-epic-universe {
            position: absolute; top: 12%;
            /* บินออกมาช้ากว่าเดิม (delay 3s) และวิ่งสอดคล้องกับจังหวะระเบิด */
            animation: dragonMasterFlight 20s infinite linear;
            animation-delay: 3s;
            z-index: 60;
        }
        .dragon-master-model {
            position: relative; width: 360px; height: 160px;
            transform: perspective(1000px) rotateY(-25deg) rotateZ(3deg);
            transform-style: preserve-3d;
        }
        .dm-body {
            position: absolute; left: 100px; top: 45px;
            width: 140px; height: 55px;
            background: linear-gradient(135deg, var(--dragon-dark) 0%, var(--dragon-mid) 60%, #1a0202 100%);
            border-radius: 45% 55% 45% 40%;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            animation: dmBodyMove 1s infinite alternate ease-in-out;
        }
        .dm-head {
            position: absolute; left: 225px; top: 20px;
            width: 80px; height: 48px;
            background: var(--dragon-dark);
            border-radius: 20px 50px 35px 20px;
            z-index: 65;
        }
        .dm-head::before {
            content: ''; position: absolute; top: -18px; left: 15px;
            width: 7px; height: 28px; background: #eaeaea;
            border-radius: 50% 50% 0 0; transform: rotate(-20deg);
            box-shadow: 0 0 10px rgba(255,255,255,0.6);
        }
        .dm-eye {
            position: absolute; top: 12px; left: 45px;
            width: 10px; height: 5px; background: var(--magic-cyan);
            box-shadow: 0 0 15px var(--magic-cyan);
            clip-path: polygon(0 20%, 100% 0, 70% 100%);
        }
        .dm-jaw {
            position: absolute; bottom: -8px; left: 35px;
            width: 45px; height: 18px; background: #1f0404;
            border-radius: 0 0 12px 12px;
            transform-origin: top left;
            animation: dmJawOpen 2.5s infinite ease-in-out;
        }
        .dm-fire-blast {
            position: absolute; left: 295px; top: 38px;
            width: 150px; height: 60px;
            background: radial-gradient(circle, #fff 10%, #ff8c00 50%, transparent 70%);
            filter: blur(1px); opacity: 0; transform: scale(0.3);
            animation: dmFire 2.5s infinite ease-in-out;
            box-shadow: 0 0 35px #ff2a00;
            z-index: 66;
        }
        .dm-wing-front {
            position: absolute; top: -60px; left: 130px;
            width: 130px; height: 130px;
            background: linear-gradient(210deg, var(--dragon-light), #210303);
            clip-path: polygon(0 85%, 35% 0, 100% 25%, 55% 100%);
            transform-origin: bottom left;
            animation: dmWing 0.45s infinite alternate ease-in-out;
            z-index: 67;
        }
        .dm-tail-long {
            position: absolute; left: -75px; top: 55px;
            width: 185px; height: 14px;
            background: linear-gradient(to right, transparent, var(--dragon-dark));
            border-radius: 50%;
            transform-origin: right center;
            animation: dmTailWhip 0.7s infinite alternate ease-in-out;
        }
        .dm-tail-fin {
            position: absolute; left: 0; top: -12px;
            width: 25px; height: 38px;
            background: var(--dragon-mid);
            clip-path: polygon(100% 50%, 0 0, 30% 50%, 0 100%);
        }

        @keyframes dmWing { 0% { transform: rotateX(-35deg) rotateY(-5deg); } 100% { transform: rotateX(45deg) rotateY(15deg); } }
        @keyframes dmBodyMove { 0% { transform: translateY(-4px) rotateZ(-1deg); } 100% { transform: translateY(4px) rotateZ(1deg); } }
        @keyframes dmTailWhip { 0% { transform: rotate(-10deg); } 100% { transform: rotate(10deg); } }
        @keyframes dmJawOpen { 0%, 100% { transform: rotate(0deg); } 35%, 65% { transform: rotate(22deg); } }
        @keyframes dmFire { 0%, 100% { opacity: 0; transform: scale(0.3); } 40%, 60% { opacity: 1; transform: scale(1.6) translateX(30px) rotate(15deg); } }
        
        @keyframes dragonMasterFlight {
            0% { left: -400px; transform: translateY(40px) scale(0.6); }
            45% { transform: translateY(-10px) scale(0.85); }
            100% { left: 120vw; transform: translateY(40px) scale(0.6); }
        }

        /* --- 💥 เอฟเฟกต์ไฟไหม้และระเบิดบนพื้นผิวทราย/หญ้า แล้วสลายหายไป --- */
        .fire-explosion {
            position: absolute; bottom: 105px;
            width: 120px; height: 120px;
            z-index: 12;
            background: radial-gradient(circle, #fff 10%, #ff5500 40%, #ffcc00 70%, transparent 80%);
            border-radius: 50%;
            filter: blur(4px);
            opacity: 0;
            /* ขยับไล่ตามหลังขบวนอัศวินและสัมพันธ์กับดีเลย์มังกร */
            animation: groundBoom 20s infinite linear;
            animation-delay: 3s;
        }
        
        /* เสริมเปลวไฟลุกท่วมสลายตัว */
        .fire-explosion::before {
            content: ''; position: absolute; bottom: 10px; left: 20px;
            width: 80px; height: 90px;
            background: linear-gradient(to top, rgba(255,69,0,0.9), rgba(255,215,0,0.6), transparent);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            filter: blur(2px);
        }

        @keyframes groundBoom {
            0%, 25% { left: -100px; opacity: 0; transform: scale(0.2); }
            /* จังหวะมังกรพ่นไฟลงพื้น เกิดระเบิดตูมใหญ่ */
            30% { opacity: 1; transform: scale(1.3); filter: brightness(1.5); }
            /* เกิดเป็นไฟไหม้ลุกค้างไว้ช่วงนึง */
            35% { opacity: 0.9; transform: scale(1.1) skewX(-10deg); }
            /* ค่อยๆ มอดดับหายไปในดิน */
            45%, 100% { opacity: 0; transform: scale(0.5); left: 70vw; }
        }

        /* --- 🛡️ กองทัพอัศวินวิ่งหนีสุดชีวิต --- */
        .knights-runway {
            position: absolute; bottom: 105px; left: 0; width: 100%; height: 90px;
            z-index: 15;
        }
        .magic-knight {
            position: absolute; width: 45px; height: 75px;
            filter: drop-shadow(0 5px 8px rgba(0,0,0,0.5));
            animation: knightPanicRun 20s infinite linear;
        }
        .knight-armor {
            position: absolute; bottom: 0; left: 10px;
            width: 26px; height: 48px;
            background: linear-gradient(90deg, #7f8c8d, #bdc3c7, #34495e);
            border-radius: 6px 6px 0 0;
            animation: knightLegs 0.15s infinite alternate linear;
        }
        .knight-helmet {
            position: absolute; top: 16px; left: 13px;
            width: 20px; height: 20px;
            background: #7f8c8d; border-radius: 50%;
            border-bottom: 3px solid #2c3e50;
        }
        .knight-cape {
            position: absolute; top: 30px; left: -4px;
            width: 16px; height: 35px; background: #c0392b;
            border-radius: 4px; transform-origin: top right;
            animation: capeFlutter 0.1s infinite alternate ease-in-out;
        }

        .k1 { animation-delay: 0.5s; }
        .k2 { animation-delay: 1.2s; }
        .k2 .knight-cape { background: #2980b9; }
        .k3 { animation-delay: 1.8s; }
        .k3 .knight-cape { background: #8e44ad; }
        .k4 { animation-delay: 2.5s; }
        .k4 .knight-cape { background: #d35400; }

        @keyframes knightPanicRun {
            0% { left: -150px; transform: scale(0.75) skewX(10deg); }
            100% { left: 120vw; transform: scale(0.75) skewX(10deg); }
        }
        @keyframes knightLegs {
            0% { transform: translateY(0) rotate(2deg); }
            100% { transform: translateY(-3px) rotate(-2deg); }
        }
        @keyframes capeFlutter {
            0% { transform: rotate(35deg); }
            100% { transform: rotate(55deg); }
        }

        /* --- พื้นดินเรียบหรูพร้อมต้นหญ้าตั้งชันแยกต้น --- */
        .ground-flat-luxury {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 110px;
            background: linear-gradient(to bottom, #0b3a1e 0%, #051d0f 100%);
            border-top: 3px solid rgba(46, 204, 113, 0.35);
            z-index: 10;
        }
        .grass-blades-container {
            position: absolute; top: -22px; left: 0; width: 100%; height: 30px;
            display: flex; justify-content: space-around; align-
