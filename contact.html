<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Sarabun",sans-serif;
}


body{

    min-height:100vh;

    color:white;

    overflow:hidden;

    background:
    linear-gradient(
    135deg,
    #020024,
    #090979,
    #4b0082,
    #ff0080
    );

    background-size:400% 400%;

    animation:galaxy 15s infinite alternate;

}


@keyframes galaxy{

0%{
background-position:0% 50%;
}

100%{
background-position:100% 50%;
}

}



/* ดาวในอวกาศ */

body::before{

content:"";

position:absolute;

width:100%;

height:100%;

background-image:

radial-gradient(white 1px,transparent 1px),

radial-gradient(#00ffff 1px,transparent 1px),

radial-gradient(#ff66ff 1px,transparent 1px);


background-size:

80px 80px,

140px 140px,

220px 220px;


opacity:.5;

animation:stars 30s linear infinite;

z-index:-2;

}



@keyframes stars{

from{

transform:translateY(0);

}

to{

transform:translateY(-200px);

}

}



/* ดาวตก */

.shooting{

position:absolute;

width:120px;

height:3px;

background:linear-gradient(
90deg,
white,
transparent
);

transform:rotate(-45deg);

animation:shoot 5s infinite;

opacity:0;

}


.s1{

top:20%;

left:10%;

}



.s2{

top:40%;

left:70%;

animation-delay:2s;

}



@keyframes shoot{

0%{

opacity:0;

transform:translate(0,0) rotate(-45deg);

}


10%{

opacity:1;

}


100%{

opacity:0;

transform:translate(500px,500px) rotate(-45deg);

}

}



/* ดาวเคราะห์ */

.planet{

position:absolute;

border-radius:50%;

}


.planet1{

width:180px;

height:180px;

right:-60px;

top:120px;


background:

radial-gradient(circle at 30% 30%,
#fff,
#7b2cff,
#12002b);


box-shadow:0 0 50px #9d4edd;


animation:spin 20s linear infinite;

}


.planet2{

width:120px;

height:120px;

left:-40px;

bottom:80px;


background:

radial-gradient(circle at 30% 30%,
#ffd700,
#ff4500,
#500000);


box-shadow:0 0 40px orange;

}


@keyframes spin{

from{

transform:rotate(0deg);

}

to{

transform:rotate(360deg);

}

}



/* เมนู */

nav{

background:rgba(0,0,0,.3);

padding:18px;

text-align:center;

backdrop-filter:blur(10px);

}



nav a{

color:white;

text-decoration:none;

margin:0 15px;

font-weight:bold;

transition:.3s;

}



nav a:hover{

color:#00ffff;

text-shadow:0 0 15px cyan;

}




/* กล่องหลัก */

.container{

width:85%;

max-width:850px;

margin:50px auto;

padding:40px;


background:

rgba(255,255,255,.12);


border-radius:30px;


backdrop-filter:blur(15px);


border:1px solid rgba(255,255,255,.3);


box-shadow:

0 0 40px rgba(0,255,255,.5);


text-align:center;


}



h1{

font-size:40px;

margin-bottom:30px;


text-shadow:

0 0 10px cyan,

0 0 20px #ff00ff;


}



/* กล่องข้อมูล */

.contact-box{

display:flex;

align-items:center;

gap:20px;

padding:20px;

margin:20px 0;


border-radius:25px;


background:

linear-gradient(
135deg,
rgba(0,255,255,.2),
rgba(180,0,255,.3)
);


border:1px solid rgba(255,255,255,.3);


color:white;

text-decoration:none;


transition:.4s;


box-shadow:

0 0 15px rgba(0,255,255,.2);

}



.contact-box:hover{


transform:

translateY(-8px)
scale(1.03);


background:

linear-gradient(
135deg,
#00c6ff,
#7b2cff,
#ff0080
);


box-shadow:

0 0 30px cyan,

0 0 50px magenta;


}



.icon{

font-size:45px;

width:70px;

height:70px;

display:flex;

align-items:center;

justify-content:center;


background:rgba(255,255,255,.2);


border-radius:50%;


}



.text{

text-align:left;

}



.text h2{

font-size:25px;

}



.text p{

font-size:18px;

}



/* ปุ่ม */

.btn{

display:inline-block;

margin-top:25px;

padding:15px 35px;


border-radius:30px;


background:

linear-gradient(
45deg,
#00ffff,
#7b2cff,
#ff0080
);


color:white;


text-decoration:none;


font-weight:bold;


transition:.3s;


}



.btn:hover{

transform:scale(1.1);

box-shadow:

0 0 25px cyan;

}




footer{

position:absolute;

bottom:0;

width:100%;

padding:15px;

text-align:center;


background:rgba(0,0,0,.3);

}



</style>
