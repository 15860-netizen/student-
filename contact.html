<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | ช่องทางการติดต่อ</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Sarabun",sans-serif;
}


body{

    min-height:100vh;

    color:white;

    overflow-x:hidden;

    background:
    linear-gradient(
    135deg,
    #020024,
    #090979,
    #3b0066,
    #ff0080
    );

    background-size:400% 400%;

    animation:galaxy 15s infinite alternate;

}


/* พื้นหลังจักรวาล */

@keyframes galaxy{

    0%{
        background-position:0% 50%;
    }

    100%{
        background-position:100% 50%;
    }

}



/* ดาว */

body::before{

content:"";

position:fixed;

width:100%;

height:100%;


background-image:

radial-gradient(white 1px,transparent 1px),

radial-gradient(#00ffff 1px,transparent 1px),

radial-gradient(#ff66ff 1px,transparent 1px);


background-size:

80px 80px,

150px 150px,

220px 220px;


opacity:.45;


animation:starsMove 40s linear infinite;


z-index:-2;

}



@keyframes starsMove{

from{

transform:translateY(0);

}

to{

transform:translateY(-300px);

}

}



/* ดาวตก */

.shooting-star{

position:absolute;

width:120px;

height:3px;

background:linear-gradient(
90deg,
white,
transparent
);

transform:rotate(-45deg);

animation:shoot 5s infinite;

opacity:0;

}


.star1{

top:20%;

left:10%;

animation-delay:1s;

}


.star2{

top:50%;

left:70%;

animation-delay:3s;

}


@keyframes shoot{

0%{

opacity:0;

transform:
translate(0,0)
rotate(-45deg);

}


10%{

opacity:1;

}


100%{

opacity:0;

transform:
translate(500px,500px)
rotate(-45deg);

}

}



/* ดาวเคราะห์ */

.planet{

position:absolute;

border-radius:50%;

filter:blur(.2px);

}


.planet1{

width:180px;

height:180px;

right:-60px;

top:120px;


background:

radial-gradient(
circle at 30% 30%,
#fff,
#7b2cff,
#12002b
);


box-shadow:

0 0 40px #8a2be2;


animation:rotatePlanet 20s infinite linear;

}



.planet2{

width:100px;

height:100px;

left:-30px;

bottom:100px;


background:

radial-gradient(
circle at 30% 30%,
#ffd700,
#ff4500,
#500000
);


box-shadow:

0 0 30px orange;


}


@keyframes rotatePlanet{

from{

transform:rotate(0deg);

}

to{

transform:rotate(360deg);

}

}



/* เมนู */

nav{

padding:18px;

text-align:center;

background:rgba(0,0,0,.25);

backdrop-filter:blur(10px);

}



nav a{

color:white;

text-decoration:none;

margin:0 15px;

font-weight:bold;

transition:.3s;

}



nav a:hover{

color:#00ffff;

text-shadow:0 0 15px cyan;

}



/* กล่องหลัก */


.container{

width:85%;

max-width:900px;

margin:50px auto;

padding:40px;


background:

rgba(255,255,255,.12);


border-radius:30px;


border:

1px solid rgba(255,255,255,.3);


backdrop-filter:blur(15px);


box-shadow:

0 0 40px rgba(0,255,255,.4);


text-align:center;

animation:show .8s ease;

}


@keyframes show{

from{

opacity:0;

transform:translateY(50px);

}


to{

opacity:1;

transform:translateY(0);

}

}



h1{

font-size:42px;

margin-bottom:35px;


color:white;


text-shadow:

0 0 10px cyan,

0 0 20px #ff00ff;

}
