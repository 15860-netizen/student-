<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio เมธาสิทธิ์</title>

    <style>
        body{
            margin:0;
            font-family:Tahoma, sans-serif;
            background:linear-gradient(135deg,#ff6633,#ff9966);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:#ffffff;
            width:400px;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        .profile{
            width:150px;
            height:150px;
            border-radius:50%;
            background:#ddd;
            margin:0 auto 20px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:60px;
        }

        h1{
            color:#ff6633;
            margin-bottom:10px;
        }

        p{
            font-size:18px;
            color:#555;
            margin:8px 0;
        }

        footer{
            margin-top:20px;
            color:#888;
            font-size:14px;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="profile">
            👨‍🎓
        </div>

        <h1>นายเมธาสิทธิ์ ขันติกุล</h1>

        <p><strong>ระดับชั้น:</strong> มัธยมศึกษาปีที่ 6/1</p>

        <p><strong>โรงเรียน:</strong> โรงเรียนพานทอง</p>

        <footer>
            Portfolio ของเมธาสิทธิ์
        </footer>

    </div>

</body>
</html>
