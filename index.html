<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio นาย เมธาสิทธิ์ - T-Rex Run Desert</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Sarabun", sans-serif;
}

body{
    background: linear-gradient(to bottom, #FF8C00, #FFD700, #B8860B, #8B4513);
    background-size: 100% 400%;
    animation: hot-day 20s infinite linear;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    position: relative;
}

@keyframes hot-day {
    0%, 100% { background-position: 0% 0%; }
    50% { background-position: 0% 100%; }
}

/* เอฟเฟกต์หญ้ากลมกลิ้ง */
.tumbleweed {
    position: absolute;
    width: 60px;
    height: 60px;
    background-image: radial-gradient(circle, #D2B48C, #8B4513);
    border-radius: 50%;
    filter: blur(1.5px);
    opacity: 0.5;
    animation: tumble-horizontal 15s infinite linear;
    bottom: 120px;
    z-index: 2;
}

@keyframes tumble-horizontal {
    0% { left: -100px; transform: rotate(0deg); }
    100% { left: 120vw; transform: rotate(3600deg); }
}

/* ==================================================
   [ โซนจำลองเกมไดโนเสาร์วิ่งข้ามกระบองเพชรของจริง ]
   ================================================== */

.desert-stage {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 140px;
    background: transparent;
    z-index: 5;
    pointer-events: none;
}

/* เส้นพื้นทรายเรียบๆ ด้านล่าง */
.sand-floor {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 35px;
    background: #5c3a16;
    border-top: 4px solid #FFD700;
}

/* อนิเมชั่นตัวไดโนเสาร์ วิ่ง + กระโดด */
.dino {
    position: absolute;
    bottom: 30px;
    left: 15%;
    font-size: 45px;
    width: 50px;
    height: 50px;
    line-height: 50px;
    text-align: center;
    transform: scaleX(-1);
    z-index: 6;
    /* แอนิเมชั่นวิ่งสลับกับกระโดดให้สมจริง */
    animation: dino-run 0.15s infinite alternate linear, dino-jump 4s infinite ease-in-out;
}

/* ทำท่าทางเหมือนขยับขาตอนวิ่ง */
@keyframes dino-run {
    0% { transform: scaleX(-1) translateY(0px) skewX(-2deg); }
    100% { transform: scaleX(-1) translateY(-2px) skewX(2deg); }
}

/* จังหวะลอยตัวหลบกระบองเพชรกลุ่มต่างๆ */
@keyframes dino-jump {
    0%, 20%, 32%, 48%, 60%, 75%, 87%, 100% { bottom: 30px; } /* อยู่บนพื้นทราย */
    26% { bottom: 125px; } /* กระโดดหลบต้นที่ 1 */
    54% { bottom: 130px; } /* กระโดดสูงหลบต้นคู่ 2 ต้น */
    81% { bottom: 135px; } /* กระโดดสูงสุดหลบกลุ่ม 3 ต้น */
}

/* กลุ่มกระบองเพชรที่วิ่งสวนมา */
.cactus-group {
    position: absolute;
    bottom: 31px;
    display: flex;
    align-items: flex-end;
    gap: 4px;
    animation: obstacle-move 4s infinite linear;
}

/* ความเร็วในการวิ่งสวนทางของสิ่งกีดขวาง */
@keyframes obstacle-move {
    0% { left: 100vw; }
    100% { left: -200px; }
}

/* จัดจังหวะการโผล่ของแต่ละกลุ่ม (ต้นเดี่ยว / คู่สอง / สามต้นติด) */
.group-1 { animation-delay: 0s; }
.group-2 { animation-delay: 1.3s; }
.group-3 { animation-delay: 2.6s; }

/* ตัวโมเดลต้นกระบองเพชร */
.cactus-spine {
    width: 18px;
    height: 45px;
    background: #224d19;
    border-radius: 4px 4px 0 0;
    position: relative;
    box-shadow: inset -3px 0 rgba(0,0,0,0.2);
}
/* แตกกิ่งซ้ายขวา */
.cactus-spine::before, .cactus-spine::after {
    content: '';
    position: absolute;
    background: #224d19;
    width: 8px;
    height: 15px;
    border-radius: 3px;
}
.cactus-spine::before { left: -6px; top: 12px; border-radius: 3px 0 0 3px; }
.cactus-spine::after { right: -6px; top: 18px; border-radius: 0 3px 3px 0; }

/* ปรับความสูงต่ำให้ดูเป็นธรรมชาติ */
.spine-short { height: 35px; }
.spine-tall { height: 55px; }


/* ==================================================
   [ ส่วนของเมนูและกล่องเนื้อหา ]
   ================================================== */
nav{
    background:rgba(139, 69, 19, 0.65);
    padding:15px;
    text-align:center;
    position:sticky;
    top:0;
    z-index: 1000;
    backdrop-filter: blur(5px);
}

nav a{
    color:#FFD700;
    text-decoration:none;
    margin:0 15px;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
    text-shadow: 2px 2px 4px #000;
}

nav a:hover{
    color: white;
    text-shadow: 0 0 10px #FFD700;
}

.container{
    width:80%;
    max-width:900px;
    margin: 60px auto 180px auto; 
    background:rgba(255, 255, 255, 0.12);
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow: 0 0 30px #FFD700;
    backdrop-filter:blur(10px);
    border: 2px solid #FFD700;
    z-index: 10;
    position: relative;
}

.profile-img{
    width:220px;
    height:220px;
    border-radius:50%;
    border:8px solid #FFD700;
    object-fit:cover;
    margin-bottom:25px;
    box-shadow: 0 0 20px #8B4513;
    cursor:pointer;
    transition:0.3s;
    filter: sepia(40%) saturate(140%);
}

.profile-img:hover{
    transform:scale(1.08);
}

h1{
    font-size:45px;
    margin-bottom:15px;
    color: #FFD700;
    text-shadow: 3px 3px 6px #000, 0 0 10px #FFD700;
}

h2{
    color:white;
    margin-bottom:25px;
    font-size: 28px;
    text-shadow: 2px 2px 4px #000;
}

p{
    font-size:22px;
    margin:12px 0;
    color: #FFE4B5;
    text-shadow: 1px 1px 3px #000;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:14px 30px;
    background:#FFD700;
    color:#8B4513;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    font-size: 20px;
    transition:0.3s;
    box-shadow: 2px 2px 10px #000;
}

.btn:hover{
    background:#FF8C00;
    transform:translateY(-3px);
}

.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:20px;
    border:5px solid #FFD700;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:auto;
    background:rgba(139, 69, 19, 0.7);
    color: #FFD700;
    text-shadow: 1px 1px 2px #000;
    position: relative;
    z-index: 100;
}

</style>
</head>
<body>

    <div class="tumbleweed"></div>

    <!-- โซนระบบเกม T-Rex แบบมีพื้นทราย และกระบองเพชรวิ่งสวน -->
    <div class="desert-stage">
        <div class="dino">🦖</div>
        
        <!-- กลุ่มที่ 1: ต้นเดี่ยว -->
        <div class="cactus-group group-1">
            <div class="cactus-spine"></div>
        </div>

        <!-- กลุ่มที่ 2: มาเป็นคู่ 2 ต้น -->
        <div class="cactus-group group-2">
            <div class="cactus-spine spine-short"></div>
            <div class="cactus-spine"></div>
        </div>

        <!-- กลุ่มที่ 3: มาเป็นฝูง 3 ต้นติดกัน -->
        <div class="cactus-group group-3">
            <div class="cactus-spine"></div>
            <div class="cactus-spine spine-tall"></div>
            <div class="cactus-spine spine-short"></div>
        </div>

        <div class="sand-floor"></div>
    </div>

    <nav>
        <a href="profile.html">ประวัติส่วนตัว</a>
        <a href="education.html">ประวัติการศึกษา</a>
        <a href="award.html">ผลงาน</a>
        <a href="contact.html">ช่องทางการติดต่อ</a>
    </nav>

    <main>
        <div class="container">
            <img 
            src="https://raw.githubusercontent.com/15860-netizen/student-/main/images/1783827610634.jpg"
            alt="รูปโปรไฟล์"
            class="profile-img"
            onclick="openImage(this.src)">

            <h1>นาย เมธาสิทธิ์ ขันติกุล</h1>
            <h2>Portfolio</h2>
            <p>🎓 นักเรียนชั้นมัธยมศึกษาปีที่ 6/1</p>
            <p>🏫 โรงเรียนพานทอง</p>

            <a href="profile.html" class="btn">
                ดูประวัติส่วนตัว
            </a>
        </div>
    </main>

    <div id="lightbox" class="lightbox" onclick="closeImage()">
        <img id="lightbox-img" src="" alt="รูปขยาย">
    </div>

    <footer>
        © 2026 Portfolio | นาย เมธาสิทธิ์ ขันติกุล
    </footer>

    <script>
        function openImage(src){
            document.getElementById("lightbox").style.display="flex";
            document.getElementById("lightbox-img").src=src;
        }

        function closeImage(){
            document.getElementById("lightbox").style.display="none";
        }
    </script>

</body>
</html>
