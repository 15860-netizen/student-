<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลงาน</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Sarabun,sans-serif;
}

body{
    background:linear-gradient(135deg,#696969,#FFD700);
    color:white;
}

nav{
    background:rgba(0,0,0,.25);
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

.container{
    width:80%;
    max-width:900px;
    margin:40px auto;
    padding:30px;
    background:rgba(255,255,255,.15);
    border-radius:20px;
    text-align:center;
}

h1{
    margin-bottom:20px;
}

ul{
    list-style:none;
    font-size:20px;
}

li{
    margin:15px;
}

/* ส่วนแสดงรูปภาพ */
.gallery{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin:25px 0;
}

.gallery img{
    width:250px;
    height:180px;
    object-fit:cover;
    border-radius:15px;
    border:3px solid white;
    transition:.3s;
    cursor:pointer;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* Lightbox */
.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:15px;
    box-shadow:0 0 20px white;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:white;
    color:#dd191d;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
    background:rgba(0,0,0,.25);
}
</style>

</head>

<body>

<nav>
<a href="index.html">หน้าแรก</a>
<a href="profile.html">ประวัติส่วนตัว</a>
<a href="education.html">ประวัติการศึกษา</a>
<a href="award.html">ผลงาน</a>
<a href="contact.html">ติดต่อ</a>
</nav>

<div class="container">

<h1><span style="color:#FFD700;">ผลงาน</span></h1>

<div class="gallery">

    <img src="https://raw.githubusercontent.com/15860-netizen/student-/main/images/file_00000000ff9872099429ff9673d90a34.png"
         alt="ผลงาน"
         onclick="openImage(this.src)">

    <img src="images/work2.jpg"
         alt="ผลงานที่ 2"
         onclick="openImage(this.src)">

    <img src="images/work3.jpg"
         alt="ผลงานที่ 3"
         onclick="openImage(this.src)">

</div>

<ul>
<li>🏆 ได้รับเกียรติบัตร..................................</li>
<li>🥇 เข้าร่วมการแข่งขัน..................................</li>
<li>📜 ผ่านการอบรม..................................</li>
</ul>

<a href="index.html" class="btn">กลับหน้าหลัก</a>

</div>

<!-- หน้าต่างแสดงรูปขนาดใหญ่ -->
<div id="lightbox" class="lightbox" onclick="closeImage()">
    <img id="lightbox-img" src="" alt="รูปขยาย">
</div>

<footer>
© 2026 Portfolio | นาย เมธาสิทธิ์ ขันติกุล
</footer>

<script>
function openImage(src){
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = src;
}

function closeImage(){
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
